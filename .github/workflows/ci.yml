name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flipstats
          POSTGRES_PASSWORD: flipstats_password
          POSTGRES_DB: flipstats_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Build application
        run: npm run build

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://flipstats:flipstats_password@localhost:5432/flipstats_db
        run: npm run migrate:up

      - name: Run tests
        env:
          DATABASE_URL: postgresql://flipstats:flipstats_password@localhost:5432/flipstats_db
          ADMIN_TOKEN: test-token
        run: npm test

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: flipstats-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
