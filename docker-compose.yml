version: '3.8'

services:
  # Postgres Database
  postgres:
    image: postgres:16-alpine
    container_name: flipstats-postgres
    environment:
      POSTGRES_USER: flipstats
      POSTGRES_PASSWORD: flipstats_password
      POSTGRES_DB: flipstats_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flipstats"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flipstats-network

  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flipstats-api
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://flipstats:flipstats_password@postgres:5432/flipstats_db
      ADMIN_TOKEN: ${ADMIN_TOKEN:-change-this-in-production}
      LOG_LEVEL: info
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - flipstats-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  flipstats-network:
    driver: bridge
